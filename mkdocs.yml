site_name: mcp-pvp Documentation
site_description: Tokenize sensitive data before the LLM sees it.
site_url: https://spidux-ai.github.io/mcp-pvp/
repo_url: https://github.com/Spidux-ai/mcp-pvp
repo_name: Spidux-ai/mcp-pvp

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture & Security:
      - Capability Security: CAPABILITY_SECURITY.md
      - Observability: OBSERVABILITY.md
      - Threat Model: THREAT_MODEL.md
      - Protocol Specification: SPEC.md
      - Release Snapshot: v0.2.0-RELEASE-SUMMARY.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Spidux-ai/mcp-pvp
